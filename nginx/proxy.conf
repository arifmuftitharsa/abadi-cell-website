# nginx/proxy.conf — Config untuk service PUBLIK "nginx-proxy"
#
# Ini reverse proxy sungguhan: terima request publik, teruskan ke service
# privat "app" lewat jaringan internal Railway (app.railway.internal).

# Rate limiting: maksimal 30 request/detik per IP, mencegah spam/abuse
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # PENTING: Nginx meng-cache hasil DNS lookup saat container pertama
    # kali start. Kalau service "app" di-redeploy, IP internalnya berubah,
    # dan proxy bisa gagal connect sampai nginx di-restart manual.
    #
    # Solusi: pakai directive "resolver" supaya Nginx re-resolve DNS setiap
    # 1 detik, dan wajib pakai proxy_pass dengan variable ($upstream),
    # bukan hostname langsung -- ini teknik resmi yang direkomendasikan
    # tim Railway sendiri di forum komunitas mereka.
    # [fd12::10] adalah alamat resolver internal Railway untuk private network.
    resolver [fd12::10] valid=1s ipv6=on;

    # --- Gzip compression: kompres response supaya lebih cepat diterima ---
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml;
    gzip_min_length 256;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Rate limiting diterapkan di semua request ---
    limit_req zone=general burst=50 nodelay;

    # Healthcheck cepat, tidak diteruskan ke app (biar ringan)
    location /health {
        access_log off;
        return 200 "ok\n";
    }

    # Semua request lain diteruskan ke service privat "app"
    location / {
        set $upstream http://app.railway.internal:8080;
        proxy_pass $upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# nginx/app.conf — Config untuk service PRIVAT "app"
# Cuma serve file statis. Tidak ada gzip/security header di sini
# (itu tanggung jawab nginx-proxy di depan).

server {
    # [::] artinya "dengarkan di semua alamat IPv6" — WAJIB untuk private
    # networking Railway, karena jaringan privat Railway berjalan di IPv6.
    listen [::]:8080;
    listen 8080;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Endpoint kecil untuk healthcheck internal
    location /health {
        access_log off;
        return 200 "ok\n";
    }
}

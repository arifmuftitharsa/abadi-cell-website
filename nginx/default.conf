# Konfigurasi Nginx untuk container aplikasi (di dalam Docker).
# Ini adalah "app server" yang men-serve file statis.
# Reverse proxy sesungguhnya (yang menghadap internet & handle HTTPS)
# ada di nginx/reverse-proxy.conf, dijalankan sebagai container terpisah.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Kompresi gzip supaya transfer lebih ringan (relevan untuk VPS bandwidth kecil)
    gzip on;
    gzip_types text/css application/javascript text/html image/svg+xml;
    gzip_min_length 512;

    # Cache asset statis di sisi browser
    location ~* \.(css|js|png|jpg|jpeg|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # HTML wajib divalidasi ulang setiap kali, supaya perubahan desain
    # (dan link asset ber-versi di dalamnya) langsung sampai ke pengunjung.
    # Pakai `expires -1` (bukan add_header) agar header keamanan di level
    # server tetap terwarisi.
    location ~* \.html$ {
        expires -1;
    }

    location / {
        try_files $uri $uri/ =404;
        expires -1;
    }

    # Header keamanan dasar
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 404 /index.html;
}

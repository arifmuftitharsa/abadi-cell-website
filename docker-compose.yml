# docker-compose.yml
#
# Menjalankan dua service sekaligus:
# 1. web       -> website Abadi Cell & Elektrik (container aplikasi)
# 2. uptime-kuma -> monitoring/uptime checker (bonus poin: Monitoring)
#
# Nginx reverse proxy TIDAK dijalankan lewat compose ini secara sengaja --
# ia di-install langsung di VPS (bukan container) supaya bisa mengelola
# sertifikat Let's Encrypt di level sistem operasi. Lihat docs/DEPLOYMENT.md
# untuk penjelasan lengkap kenapa pemisahan ini dipilih.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abadicell-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"   # hanya bisa diakses dari localhost VPS, diteruskan oleh reverse proxy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: abadicell-monitoring
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-kuma-data:/app/data

volumes:
  uptime-kuma-data:

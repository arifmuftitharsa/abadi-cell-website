# reverse-proxy.conf
#
# Konfigurasi ini berjalan di Nginx yang di-install LANGSUNG di VPS
# (bukan di dalam container), sebagai reverse proxy di depan container
# aplikasi web (yang jalan di port internal, misal 127.0.0.1:8081).
#
# Alur traffic:
#   Internet --HTTPS--> Nginx (VPS, port 443) --HTTP--> Docker container (port 8081)
#
# Kenapa perlu reverse proxy terpisah, bukan langsung expose container?
# 1. Sertifikat HTTPS (Let's Encrypt) dikelola di level VPS, bukan di dalam container
# 2. Bisa menambah service lain di belakang proxy yang sama (monitoring, dsb)
#    tanpa mengubah container aplikasi
# 3. Standar praktik produksi: container tidak langsung terekspos ke internet

# --- HTTP: redirect semua ke HTTPS ---
server {
    listen 80;
    server_name abadicell.duckdns.org;  # GANTI dengan domain/subdomain final

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;  # dipakai Certbot untuk verifikasi domain saat request sertifikat
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: reverse proxy ke container aplikasi ---
server {
    listen 443 ssl http2;
    server_name abadicell.duckdns.org;  # GANTI dengan domain/subdomain final

    ssl_certificate     /etc/letsencrypt/live/abadicell.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abadicell.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Endpoint monitoring (Uptime Kuma) di subpath terpisah, opsional
    location /status/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

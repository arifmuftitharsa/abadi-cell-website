# .github/workflows/deploy.yml
#
# CI/CD untuk arsitektur Railway (2 service):
#
# CI  (di sini): setiap push ke `main`, GitHub Actions mem-build KEDUA
#     image Docker (nginx-proxy dan app) untuk memvalidasi bahwa
#     Dockerfile dan konfigurasi Nginx tidak rusak SEBELUM sampai ke
#     produksi. Kalau build gagal, kelihatan langsung di tab Actions.
#
# CD  (di Railway): Railway ter-hubung ke repo GitHub ini dan otomatis
#     build + deploy ulang kedua service setiap ada push ke `main`.
#
# Catatan: workflow lama "Deploy to VPS" (SSH ke VPS) diganti karena
# arsitektur final memakai Railway, bukan VPS yang di-SSH manual.

name: CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Build image proxy Caddy (service publik)
        run: docker build -f Dockerfile -t abadicell-proxy:ci .

      - name: Build image app (service privat)
        run: docker build -f Dockerfile.app -t abadicell-app:ci .

      - name: Validasi Caddyfile proxy
        run: docker run --rm abadicell-proxy:ci caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

      - name: Validasi konfigurasi Nginx app
        run: docker run --rm abadicell-app:ci nginx -t
